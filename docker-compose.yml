services:
  postgres:
    image: postgres:16-alpine
    container_name: arceus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arceus
      POSTGRES_PASSWORD: arceus
      POSTGRES_DB: arceus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: arceus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres-data:
